<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painon seuranta (Premium)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" id="firebase-init">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDswdEF9J0gsHJH6Zo_8BGZrf8DVG3FwYc",
  authDomain: "hakemuspaivakirja.firebaseapp.com",
  projectId: "hakemuspaivakirja",
  storageBucket: "hakemuspaivakirja.firebasestorage.app",
  messagingSenderId: "836133210317",
  appId: "1:836133210317:web:d85131ae272ecf1938c184"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const DATA_DOC = doc(db, "paino", "data");
let isSaving = false;

// ============================
// AUTH STATE
// ============================
onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('userBar').style.display = 'flex';
    document.getElementById('userEmail').textContent = user.email;
    fbLoad();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('userBar').style.display = 'none';
  }
});

// ============================
// KIRJAUTUMINEN
// ============================
window.handleLogin = async () => {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn      = document.getElementById('loginBtn');
  const err      = document.getElementById('loginError');
  if(!email || !password){ err.textContent = "Syötä sähköposti ja salasana."; return; }
  btn.disabled = true; btn.textContent = "Kirjaudutaan..."; err.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e){
    btn.disabled = false; btn.textContent = "Kirjaudu sisään";
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found'){
      err.textContent = "Väärä sähköposti tai salasana.";
    } else if(e.code==='auth/too-many-requests'){
      err.textContent = "Liian monta yritystä. Yritä myöhemmin.";
    } else { err.textContent = "Kirjautuminen epäonnistui. (" + e.code + ")"; }
  }
};

window.handleLogout = async () => {
  if(confirm('Haluatko kirjautua ulos?')) await signOut(auth);
};

function showSaveStatus(msg, color){
  let el = document.getElementById('saveStatus');
  if(!el){ el = document.createElement('div'); el.id='saveStatus'; document.body.prepend(el);
    el.style.cssText='position:fixed;top:0;left:0;right:0;padding:8px;text-align:center;font-size:13px;font-weight:700;z-index:9999;transition:opacity 0.5s;opacity:0;'; }
  el.textContent=msg; el.style.background=color||'#667eea'; el.style.color='white'; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2500);
}

// Yhdistetty tallennus
window.fbSave = async function(entries, goal){
  if(isSaving) return;
  isSaving = true;
  showSaveStatus('💾 Tallennetaan...','#f97316');
  try {
    localStorage.setItem('painodata', JSON.stringify(entries));
    if(goal !== null) localStorage.setItem('painotavoite', goal);
    await setDoc(DATA_DOC, { entries: JSON.stringify(entries), goal: goal !== null ? String(goal) : '' });
    showSaveStatus('✅ Tallennettu','#22c55e');
  } catch(e){
    showSaveStatus('❌ Tallennus epäonnistui','#dc2626');
  }
  isSaving = false;
};

// Lataus
async function fbLoad(){
  try {
    const snap = await getDoc(DATA_DOC);
    if(snap.exists()){
      const d = snap.data();
      localStorage.setItem('painodata', d.entries || '[]');
      if(d.goal) localStorage.setItem('painotavoite', d.goal);
    } else {
      // Ei dataa Firebasessa – jätä localStorage data
      const existingData = localStorage.getItem('painodata');
      if(existingData && existingData !== '[]'){
        // Siirrä vanha data Firebaseen
        const goal = localStorage.getItem('painotavoite');
        await window.fbSave(JSON.parse(existingData), goal);
      }
    }
  } catch(e){
    showSaveStatus('⚠️ Yhteysvirhe – paikallinen data','#f59e0b');
  }
  // Triggeraa render kun data on ladattu
  if(window.renderLoaded) window.renderLoaded();
}

// Reaaliaikainen kuuntelu
onSnapshot(DATA_DOC, snap => {
  if(!snap.exists() || isSaving) return;
  try {
    const d = snap.data();
    localStorage.setItem('painodata', d.entries || '[]');
    if(d.goal) localStorage.setItem('painotavoite', d.goal);
    if(window.render) { window.render(); window.updateChart(); }
  } catch(e){}
});
</script>
<style>

  button.reset-btn:hover {

  button.today-btn {

  }

  button.today-btn:hover {
    background: rgba(255, 255, 255, 0.15);

  }

  table {
    width: 100%;
    background: var(--box);
    backdrop-filter: blur(20px);

  /* Kirjautumisruutu */

<body>
<h1>💪 Painon seuranta</h1>
<div class="user-bar" id="userBar" style="display:none;">
  <span id="userEmail"></span>
  <button class="logout-btn" onclick="handleLogout()">🚪 Kirjaudu ulos</button>
</div>

<form id="painoForm">
  <label>Päivämäärä</label>
  <input type="date" id="date" required>
  <button type="button" class="today-btn" id="todayBtn">Tänään</button>

  <label>Paino (kg)</label>
  <input type="number" step="0.1" id="weight" required>

  <button class="submit-btn" type="submit">Lisää merkintä</button>
  <button class="reset-btn" type="button" id="reset">Nollaa kaikki</button>
</form>

<!-- Kirjautumisruutu -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">⚖️ Painon seuranta</div>
    <div class="login-sub">Kirjaudu sisään jatkaaksesi</div>
    <label for="emailInput">Sähköposti</label>
    <input type="email" id="emailInput" placeholder="sinun@email.fi" autocomplete="username">
    <label for="passwordInput">Salasana</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Kirjaudu sisään</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Muokkausmodal -->
<div class="modal-overlay" id="editModal" onclick="closeEditIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Muokkaa kirjausta</div>
    <div class="modal-field"><label>Päivämäärä</label><input type="date" id="editDate"></div>
    <div class="modal-field"><label>Paino (kg)</label><input type="number" step="0.1" id="editWeight" placeholder="esim. 75.5"></div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeEdit()">Peruuta</button>
      <button class="modal-btn-save" onclick="saveEdit()">Tallenna</button>
    </div>
  </div>
</div>

<div id="goalBox">
  <label>Tavoitepaino (kg)</label>
  <input type="number" step="0.1" id="goalInput">
  <button type="button" class="submit-btn" id="saveGoal">Tallenna tavoite</button>

</div>

<!-- Varmuuskopiointi alhaalla piilotettu -->
<div id="backupSection">
  <button type="button" id="backupToggleBtn">🗄️ Varmuuskopiointi</button>
  <div id="backupContent">
    <button type="button" class="today-btn" id="exportBtn">Vie JSON</button>
    <input type="file" id="importFile" accept="application/json">
    <button type="button" class="today-btn" id="importBtn">Tuo JSON</button>
  </div>
</div>

<div class="table-wrapper"><table id="table">
  <thead>
    <tr>
      <th>Pvm</th>
      <th>Paino</th>
      <th>Ed.</th>
      <th>Alk.</th>
      <th>%</th>
      <th>Tavoite</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table></div>

<div id="chartBox"><canvas id="chart"></canvas></div>

<script>
const KEY="painodata";
const GOAL_KEY="painotavoite";
const dateI=document.getElementById("date");
const weightI=document.getElementById("weight");
const tbody=document.querySelector("#table tbody");
const resetBtn=document.getElementById("reset");
const todayBtn=document.getElementById("todayBtn");
const goalI=document.getElementById("goalInput");
const saveGoal=document.getElementById("saveGoal");

// Käytetään oikeaa localStorage:a
const fakeLocalStorage = {
  getItem: (key) => localStorage.getItem(key),
  setItem: (key, value) => { localStorage.setItem(key, value); },
  removeItem: (key) => { localStorage.removeItem(key); }
};

// Renderöi kun Firebase on ladannut datan
window.renderLoaded = function(){
  render();
  updateChart();
};

document.addEventListener("DOMContentLoaded",()=>{
  dateI.value=new Date().toISOString().split("T")[0];
  goalI.value=fakeLocalStorage.getItem(GOAL_KEY)||"";
  render();
  initChart();
});

todayBtn.onclick=()=>{ dateI.value=new Date().toISOString().split("T")[0]; };

document.getElementById("painoForm").addEventListener("submit",e=>{
  e.preventDefault();
  const d=dateI.value;
  const w=parseFloat(weightI.value);
  if(!d||isNaN(w))return;
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const idx=arr.findIndex(x=>x.date===d);
  if(idx>=0)arr[idx].weight=w; else arr.push({date:d,weight:w});
  arr.sort((a,b)=>new Date(a.date)-new Date(b.date));
  fakeLocalStorage.setItem(KEY,JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));

  weightI.value="";
  render();
  updateChart();
  document.getElementById("table").scrollIntoView({ behavior:"smooth" });
});

resetBtn.onclick=()=>{ 
  if(confirm("Nollataanko kaikki?")){
    fakeLocalStorage.removeItem(KEY);
    if(window.fbSave) window.fbSave([], fakeLocalStorage.getItem(GOAL_KEY));
    render(); 
    updateChart(); 
  }
};

saveGoal.onclick=()=>{
  const g=parseFloat(goalI.value);
  if(!isNaN(g)){
    fakeLocalStorage.setItem(GOAL_KEY,g);
    const arr2 = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
    if(window.fbSave) window.fbSave(arr2, g);
    render(); 
    updateChart();
  }
};

function fmtShort(d){
  const x=new Date(d);
  return x.getDate().toString().padStart(2,"0")+"."+
         (x.getMonth()+1).toString().padStart(2,"0")+"."+
         x.getFullYear().toString().slice(2);
}

window.render = function render(){
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const goal=parseFloat(fakeLocalStorage.getItem(GOAL_KEY));
  tbody.innerHTML="";
  if(arr.length===0){
    const r=document.createElement("tr");
    const c=document.createElement("td");
    c.colSpan=6;c.textContent="Ei merkintöjä";c.style.textAlign="center";
    r.appendChild(c); tbody.appendChild(r); return;
  }
  const first=arr[0].weight;

  arr.forEach((m,i)=>{
    const r=document.createElement("tr");

    const d=document.createElement("td"); 
    d.textContent=fmtShort(m.date);
    r.appendChild(d);

    const w=document.createElement("td");
    w.textContent=m.weight.toFixed(1);
    r.appendChild(w);

    const prev=document.createElement("td");
    if(i===0)prev.textContent="-"; 
    else{
      const diff=m.weight-arr[i-1].weight;
      prev.textContent=diff.toFixed(1);
      prev.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(prev);

    const f=document.createElement("td");
    if(i===0)f.textContent="-"; 
    else{
      const diff=m.weight-first;
      f.textContent=diff.toFixed(1);
      f.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(f);

    const pct=document.createElement("td");
    if(i===0)pct.textContent="-"; 
    else{
      const p=((m.weight-first)/first)*100;
      pct.textContent=p.toFixed(1)+"%";
      pct.classList.add(p>0?"positive":p<0?"negative":"");
    }
    r.appendChild(pct);

    const goalC=document.createElement("td");
    if(isNaN(goal)) goalC.textContent="-";
    else{
      const diff=m.weight-goal;
      goalC.textContent=diff.toFixed(1);
      goalC.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(goalC);

    r.classList.add("highlight");

    // Toimintonapit
    const actTd = document.createElement("td");
    actTd.innerHTML = `<div class="row-actions">
      <button class="btn-edit-row" onclick="openEditRow('${m.date}')">✏️</button>
      <button class="btn-del-row" onclick="deleteRow('${m.date}')">✕</button>
    </div>`;
    r.appendChild(actTd);

    tbody.appendChild(r);
  });
}

let chartObj;
function initChart(){
  const ctx=document.getElementById("chart").getContext("2d");
  chartObj=new Chart(ctx,{
    type:"line",
    data:{labels:[],datasets:[
      {
        label:"Paino (kg)",
        data:[],
        borderColor:"#667eea",
        backgroundColor:"rgba(102, 126, 234, 0.2)",
        fill:true,
        tension:0.4,
        borderWidth: 3,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: "#667eea",
        pointBorderColor: "#fff",
        pointBorderWidth: 2
      },
      {
        label:"Tavoite",
        data:[],
        borderColor:"#f093fb",
        borderDash:[8,4],
        pointRadius:0,
        borderWidth: 2
      }
    ]},
    options:{
      animation:{ duration:1000, easing:"easeOutQuart" },
      responsive:true,
      maintainAspectRatio: true,
      scales:{
        x:{
          ticks:{color:"rgba(255,255,255,0.8)", font: {size: 11}},
          grid:{color:"rgba(255,255,255,0.05)"}
        },
        y:{
          ticks:{color:"rgba(255,255,255,0.8)", font: {size: 11}},
          grid:{color:"rgba(255,255,255,0.05)"}
        }
      },
      plugins:{
        legend:{
          labels:{color:"#fff", font: {size: 13, weight: '600'}},
          position: 'top'
        }
      }
    }
  });
  updateChart();
}

window.updateChart = function updateChart(){
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const goal=parseFloat(fakeLocalStorage.getItem(GOAL_KEY));
  chartObj.data.labels=arr.map(x=>fmtShort(x.date));
  chartObj.data.datasets[0].data=arr.map(x=>x.weight);
  chartObj.data.datasets[1].data=isNaN(goal)?arr.map(()=>null):arr.map(()=>goal);
  chartObj.update();
}

document.getElementById('backupToggleBtn').onclick = function(){
  const content = document.getElementById('backupContent');
  const btn = document.getElementById('backupToggleBtn');
  content.classList.toggle('open');
  btn.classList.toggle('open');

// JSON Vienti
document.getElementById("exportBtn").onclick = () => {
  const data = {
    entries: JSON.parse(fakeLocalStorage.getItem(KEY) || "[]"),
    goal: fakeLocalStorage.getItem(GOAL_KEY) || null
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "painonseuranta_backup.json";
  a.click();
  URL.revokeObjectURL(url);
};

// JSON Tuonti
document.getElementById("importBtn").onclick = () => {
  const fileInput = document.getElementById("importFile");
  if (!fileInput.files.length) {
    alert("Valitse JSON-tiedosto ensin.");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) {
        alert("Virheellinen tiedosto.");
        return;
      }

      fakeLocalStorage.setItem(KEY, JSON.stringify(data.entries));
      if (data.goal !== undefined && data.goal !== null) {
        fakeLocalStorage.setItem(GOAL_KEY, data.goal);
      }

      if(window.fbSave) window.fbSave(data.entries, data.goal || null);
      alert("Tiedot tuotu onnistuneesti.");
      render();
      updateChart();

    } catch (err) {
      alert("JSON-luku epäonnistui.");
    }
  };

  reader.readAsText(file);
};

// MUOKKAUS & POISTO
// ============================
let editingDate = null;

window.openEditRow = function(date){
  editingDate = date;
  const arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const entry = arr.find(x => x.date === date);
  if(!entry) return;
  document.getElementById('editDate').value = entry.date;
  document.getElementById('editWeight').value = entry.weight;
  document.getElementById('editModal').classList.add('open');
};

window.closeEdit = function(){
  document.getElementById('editModal').classList.remove('open');
  editingDate = null;
};

window.closeEditIfOutside = function(e){
  if(e.target === document.getElementById('editModal')) closeEdit();
};

window.saveEdit = function(){
  const newDate = document.getElementById('editDate').value;
  const newWeight = parseFloat(document.getElementById('editWeight').value);
  if(!newDate || isNaN(newWeight)){ alert('Tarkista päivämäärä ja paino!'); return; }
  let arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const idx = arr.findIndex(x => x.date === editingDate);
  if(idx >= 0){ arr[idx] = { date: newDate, weight: newWeight }; }
  arr.sort((a,b) => new Date(a.date)-new Date(b.date));
  fakeLocalStorage.setItem(KEY, JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));
  closeEdit();
  render(); updateChart();
};

window.deleteRow = function(date){
  if(!confirm('Poistetaanko tämä kirjaus?')) return;
  let arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  arr = arr.filter(x => x.date !== date);
  fakeLocalStorage.setItem(KEY, JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));
  render(); updateChart();
};
