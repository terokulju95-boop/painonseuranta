<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painon seuranta (Premium)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" id="firebase-init">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDswdEF9J0gsHJH6Zo_8BGZrf8DVG3FwYc",
  authDomain: "hakemuspaivakirja.firebaseapp.com",
  projectId: "hakemuspaivakirja",
  storageBucket: "hakemuspaivakirja.firebasestorage.app",
  messagingSenderId: "836133210317",
  appId: "1:836133210317:web:d85131ae272ecf1938c184"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DATA_DOC = doc(db, "paino", "data");
let isSaving = false;

function showSaveStatus(msg, color){
  let el = document.getElementById('saveStatus');
  if(!el){ el = document.createElement('div'); el.id='saveStatus'; document.body.prepend(el);
    el.style.cssText='position:fixed;top:0;left:0;right:0;padding:8px;text-align:center;font-size:13px;font-weight:700;z-index:9999;transition:opacity 0.5s;opacity:0;'; }
  el.textContent=msg; el.style.background=color||'#667eea'; el.style.color='white'; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2500);
}

// Yhdistetty tallennus
window.fbSave = async function(entries, goal){
  if(isSaving) return;
  isSaving = true;
  showSaveStatus('💾 Tallennetaan...','#f97316');
  try {
    localStorage.setItem('painodata', JSON.stringify(entries));
    if(goal !== null) localStorage.setItem('painotavoite', goal);
    await setDoc(DATA_DOC, { entries: JSON.stringify(entries), goal: goal !== null ? String(goal) : '' });
    showSaveStatus('✅ Tallennettu','#22c55e');
  } catch(e){
    showSaveStatus('❌ Tallennus epäonnistui','#dc2626');
  }
  isSaving = false;
};

// Lataus
async function fbLoad(){
  try {
    const snap = await getDoc(DATA_DOC);
    if(snap.exists()){
      const d = snap.data();
      localStorage.setItem('painodata', d.entries || '[]');
      if(d.goal) localStorage.setItem('painotavoite', d.goal);
    } else {
      // Ei dataa Firebasessa – jätä localStorage data
      const existingData = localStorage.getItem('painodata');
      if(existingData && existingData !== '[]'){
        // Siirrä vanha data Firebaseen
        const goal = localStorage.getItem('painotavoite');
        await window.fbSave(JSON.parse(existingData), goal);
      }
    }
  } catch(e){
    showSaveStatus('⚠️ Yhteysvirhe – paikallinen data','#f59e0b');
  }
  // Triggeraa render kun data on ladattu
  if(window.renderLoaded) window.renderLoaded();
}

// Reaaliaikainen kuuntelu
onSnapshot(DATA_DOC, snap => {
  if(!snap.exists() || isSaving) return;
  try {
    const d = snap.data();
    localStorage.setItem('painodata', d.entries || '[]');
    if(d.goal) localStorage.setItem('painotavoite', d.goal);
    if(window.render) { window.render(); window.updateChart(); }
  } catch(e){}
});

fbLoad();
</script>
<style>
  :root { 
    --bg: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    --txt: #fff; 
    --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --accent-hover: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    --box: rgba(255, 255, 255, 0.08);
    --box-hover: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.18);
    --shadow: rgba(0, 0, 0, 0.4);
  }

  * {
    box-sizing: border-box;
  }

  body {
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 20px;
    max-width: 580px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
    animation: rotate 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 30px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
  }

  form, #goalBox, #chartBox {
    background: var(--box);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 24px;
    border-radius: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px var(--shadow);
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
  }

  form:hover, #goalBox:hover, #chartBox:hover {
    background: var(--box-hover);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--shadow);
  }

  label {
    font-size: 0.85rem;
    margin-bottom: 8px;
    display: block;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255, 255, 255, 0.8);
  }

  input, button {
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.05);
    color: var(--txt);
    font-size: 1rem;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  input:focus {
    outline: none;
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
  }

  input:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  button {
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  button:active::before {
    width: 300px;
    height: 300px;
  }

  button.submit-btn { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }

  button.submit-btn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  }

  button.reset-btn { 
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
    border: none;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
  }

  button.reset-btn:hover {
    background: linear-gradient(135deg, #ee5a6f 0%, #ff6b6b 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
  }

  button.today-btn { 
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border);
    margin-top: 4px;
  }

  button.today-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.3);
  }

  table {
    width: 100%;
    background: var(--box);
    backdrop-filter: blur(20px);
    border-collapse: collapse;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px var(--shadow);
    position: relative;
    z-index: 1;
  }

  th, td { 
    padding: 14px 10px;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  thead { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.8rem;
  }

  tbody tr {
    transition: all 0.3s ease;
  }

  tbody tr:hover {
    background: rgba(255, 255, 255, 0.05);
    transform: scale(1.01);
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .positive { 
    color: #4ade80;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
  }

  .negative { 
    color: #f87171;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(248, 113, 113, 0.3);
  }

  .highlight {
    animation: flash 1s ease-in-out;
  }

  @keyframes flash {
    0%, 100% { background-color: transparent; }
    50% { background-color: rgba(102, 126, 234, 0.2); }
  }

  hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 20px 0;
  }

  #chartBox {
    padding: 30px 20px;
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 2rem;
    }
    
    form, #goalBox, #chartBox {
      padding: 18px;
      border-radius: 16px;
    }
    
    th, td {
      padding: 10px 6px;
      font-size: 0.8rem;
    }
  }

  /* PIN */
  #pinScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
  .pin-title{font-size:26px;font-weight:800;color:white;}
  .pin-sub{font-size:14px;color:rgba(255,255,255,0.6);}
  .pin-dots{display:flex;gap:14px;margin:8px 0;}
  .pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:transparent;transition:background 0.15s;}
  .pin-dot.filled{background:white;}
  .pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:10px;}
  .pin-key{height:76px;width:76px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
  .pin-key:active{background:rgba(255,255,255,0.3);}
  .pin-error{color:#f9a8b8;font-weight:700;font-size:14px;min-height:20px;}

  /* MUOKKAUS MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:10000;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;animation:fadeInM 0.2s ease;}
  @keyframes fadeInM{from{opacity:0}to{opacity:1}}
  .modal-sheet{background:#1a1735;border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;max-width:580px;border:1px solid rgba(255,255,255,0.1);animation:slideUpM 0.3s cubic-bezier(0.4,0,0.2,1);}
  @keyframes slideUpM{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 20px;}
  .modal-title{font-size:18px;font-weight:700;color:white;margin-bottom:20px;}
  .modal-field{margin-bottom:14px;}
  .modal-field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px;}
  .modal-field input{width:100%;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:white;font-size:16px;outline:none;}
  .modal-field input:focus{border-color:#667eea;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-btn-save{flex:1;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
  .modal-btn-cancel{flex:1;padding:13px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:10px;font-size:15px;cursor:pointer;}

  /* Toimintonapit taulukossa */
  .row-actions{display:flex;gap:4px;justify-content:flex-end;}
  .btn-edit-row{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.4);color:#a5b4fc;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .btn-edit-row:hover{background:rgba(102,126,234,0.4);}
  .btn-del-row{background:rgba(255,77,77,0.15);border:1px solid rgba(255,77,77,0.3);color:#fca5a5;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .btn-del-row:hover{background:rgba(255,77,77,0.3);}
</style>

</head>

<body>
<h1>💪 Painon seuranta</h1>

<form id="painoForm">
  <label>Päivämäärä</label>
  <input type="date" id="date" required>
  <button type="button" class="today-btn" id="todayBtn">Tänään</button>

  <label>Paino (kg)</label>
  <input type="number" step="0.1" id="weight" required>

  <button class="submit-btn" type="submit">Lisää merkintä</button>
  <button class="reset-btn" type="button" id="reset">Nollaa kaikki</button>
</form>

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-title">⚖️ Painon seuranta</div>
  <div class="pin-sub">Syötä PIN-koodi</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" data-v="1">1</button><button class="pin-key" data-v="2">2</button><button class="pin-key" data-v="3">3</button>
    <button class="pin-key" data-v="4">4</button><button class="pin-key" data-v="5">5</button><button class="pin-key" data-v="6">6</button>
    <button class="pin-key" data-v="7">7</button><button class="pin-key" data-v="8">8</button><button class="pin-key" data-v="9">9</button>
    <button class="pin-key" data-v="back" style="font-size:18px">←</button><button class="pin-key" data-v="0">0</button><button class="pin-key" data-v="clear" style="font-size:16px">✕</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Muokkausmodal -->
<div class="modal-overlay" id="editModal" onclick="closeEditIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Muokkaa kirjausta</div>
    <div class="modal-field"><label>Päivämäärä</label><input type="date" id="editDate"></div>
    <div class="modal-field"><label>Paino (kg)</label><input type="number" step="0.1" id="editWeight" placeholder="esim. 75.5"></div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeEdit()">Peruuta</button>
      <button class="modal-btn-save" onclick="saveEdit()">Tallenna</button>
    </div>
  </div>
</div>

<div id="goalBox">
  <label>Tavoitepaino (kg)</label>
  <input type="number" step="0.1" id="goalInput">
  <button type="button" class="submit-btn" id="saveGoal">Tallenna tavoite</button>

  <hr>

  <label>Varmuuskopiointi</label>
  <button type="button" class="today-btn" id="exportBtn">Vie JSON</button>

  <input type="file" id="importFile" accept="application/json">
  <button type="button" class="today-btn" id="importBtn">Tuo JSON</button>
</div>

<table id="table">
  <thead>
    <tr>
      <th>Pvm</th>
      <th>Paino</th>
      <th>Ed.</th>
      <th>Alk.</th>
      <th>%</th>
      <th>Tavoite</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="chartBox"><canvas id="chart"></canvas></div>

<script>
const KEY="painodata";
const GOAL_KEY="painotavoite";
const dateI=document.getElementById("date");
const weightI=document.getElementById("weight");
const tbody=document.querySelector("#table tbody");
const resetBtn=document.getElementById("reset");
const todayBtn=document.getElementById("todayBtn");
const goalI=document.getElementById("goalInput");
const saveGoal=document.getElementById("saveGoal");

// Käytetään oikeaa localStorage:a
const fakeLocalStorage = {
  getItem: (key) => localStorage.getItem(key),
  setItem: (key, value) => { localStorage.setItem(key, value); },
  removeItem: (key) => { localStorage.removeItem(key); }
};

// Renderöi kun Firebase on ladannut datan
window.renderLoaded = function(){
  render();
  updateChart();
};

document.addEventListener("DOMContentLoaded",()=>{
  dateI.value=new Date().toISOString().split("T")[0];
  goalI.value=fakeLocalStorage.getItem(GOAL_KEY)||"";
  render();
  initChart();
});

todayBtn.onclick=()=>{ dateI.value=new Date().toISOString().split("T")[0]; };

document.getElementById("painoForm").addEventListener("submit",e=>{
  e.preventDefault();
  const d=dateI.value;
  const w=parseFloat(weightI.value);
  if(!d||isNaN(w))return;
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const idx=arr.findIndex(x=>x.date===d);
  if(idx>=0)arr[idx].weight=w; else arr.push({date:d,weight:w});
  arr.sort((a,b)=>new Date(a.date)-new Date(b.date));
  fakeLocalStorage.setItem(KEY,JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));

  weightI.value="";
  render();
  updateChart();
  document.getElementById("table").scrollIntoView({ behavior:"smooth" });
});

resetBtn.onclick=()=>{ 
  if(confirm("Nollataanko kaikki?")){
    fakeLocalStorage.removeItem(KEY);
    if(window.fbSave) window.fbSave([], fakeLocalStorage.getItem(GOAL_KEY));
    render(); 
    updateChart(); 
  }
};

saveGoal.onclick=()=>{
  const g=parseFloat(goalI.value);
  if(!isNaN(g)){
    fakeLocalStorage.setItem(GOAL_KEY,g);
    const arr2 = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
    if(window.fbSave) window.fbSave(arr2, g);
    render(); 
    updateChart();
  }
};

function fmtShort(d){
  const x=new Date(d);
  return x.getDate().toString().padStart(2,"0")+"."+
         (x.getMonth()+1).toString().padStart(2,"0")+"."+
         x.getFullYear().toString().slice(2);
}

window.render = function render(){
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const goal=parseFloat(fakeLocalStorage.getItem(GOAL_KEY));
  tbody.innerHTML="";
  if(arr.length===0){
    const r=document.createElement("tr");
    const c=document.createElement("td");
    c.colSpan=6;c.textContent="Ei merkintöjä";c.style.textAlign="center";
    r.appendChild(c); tbody.appendChild(r); return;
  }
  const first=arr[0].weight;

  arr.forEach((m,i)=>{
    const r=document.createElement("tr");

    const d=document.createElement("td"); 
    d.textContent=fmtShort(m.date);
    r.appendChild(d);

    const w=document.createElement("td");
    w.textContent=m.weight.toFixed(1);
    r.appendChild(w);

    const prev=document.createElement("td");
    if(i===0)prev.textContent="-"; 
    else{
      const diff=m.weight-arr[i-1].weight;
      prev.textContent=diff.toFixed(1);
      prev.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(prev);

    const f=document.createElement("td");
    if(i===0)f.textContent="-"; 
    else{
      const diff=m.weight-first;
      f.textContent=diff.toFixed(1);
      f.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(f);

    const pct=document.createElement("td");
    if(i===0)pct.textContent="-"; 
    else{
      const p=((m.weight-first)/first)*100;
      pct.textContent=p.toFixed(1)+"%";
      pct.classList.add(p>0?"positive":p<0?"negative":"");
    }
    r.appendChild(pct);

    const goalC=document.createElement("td");
    if(isNaN(goal)) goalC.textContent="-";
    else{
      const diff=m.weight-goal;
      goalC.textContent=diff.toFixed(1);
      goalC.classList.add(diff>0?"positive":diff<0?"negative":"");
    }
    r.appendChild(goalC);

    r.classList.add("highlight");

    // Toimintonapit
    const actTd = document.createElement("td");
    actTd.innerHTML = `<div class="row-actions">
      <button class="btn-edit-row" onclick="openEditRow('${m.date}')">✏️</button>
      <button class="btn-del-row" onclick="deleteRow('${m.date}')">✕</button>
    </div>`;
    r.appendChild(actTd);

    tbody.appendChild(r);
  });
}

let chartObj;
function initChart(){
  const ctx=document.getElementById("chart").getContext("2d");
  chartObj=new Chart(ctx,{
    type:"line",
    data:{labels:[],datasets:[
      {
        label:"Paino (kg)",
        data:[],
        borderColor:"#667eea",
        backgroundColor:"rgba(102, 126, 234, 0.2)",
        fill:true,
        tension:0.4,
        borderWidth: 3,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: "#667eea",
        pointBorderColor: "#fff",
        pointBorderWidth: 2
      },
      {
        label:"Tavoite",
        data:[],
        borderColor:"#f093fb",
        borderDash:[8,4],
        pointRadius:0,
        borderWidth: 2
      }
    ]},
    options:{
      animation:{ duration:1000, easing:"easeOutQuart" },
      responsive:true,
      maintainAspectRatio: true,
      scales:{
        x:{
          ticks:{color:"rgba(255,255,255,0.8)", font: {size: 11}},
          grid:{color:"rgba(255,255,255,0.05)"}
        },
        y:{
          ticks:{color:"rgba(255,255,255,0.8)", font: {size: 11}},
          grid:{color:"rgba(255,255,255,0.05)"}
        }
      },
      plugins:{
        legend:{
          labels:{color:"#fff", font: {size: 13, weight: '600'}},
          position: 'top'
        }
      }
    }
  });
  updateChart();
}

window.updateChart = function updateChart(){
  const arr=JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const goal=parseFloat(fakeLocalStorage.getItem(GOAL_KEY));
  chartObj.data.labels=arr.map(x=>fmtShort(x.date));
  chartObj.data.datasets[0].data=arr.map(x=>x.weight);
  chartObj.data.datasets[1].data=isNaN(goal)?arr.map(()=>null):arr.map(()=>goal);
  chartObj.update();
}

// JSON Vienti
document.getElementById("exportBtn").onclick = () => {
  const data = {
    entries: JSON.parse(fakeLocalStorage.getItem(KEY) || "[]"),
    goal: fakeLocalStorage.getItem(GOAL_KEY) || null
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "painonseuranta_backup.json";
  a.click();
  URL.revokeObjectURL(url);
};

// JSON Tuonti
document.getElementById("importBtn").onclick = () => {
  const fileInput = document.getElementById("importFile");
  if (!fileInput.files.length) {
    alert("Valitse JSON-tiedosto ensin.");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) {
        alert("Virheellinen tiedosto.");
        return;
      }

      fakeLocalStorage.setItem(KEY, JSON.stringify(data.entries));
      if (data.goal !== undefined && data.goal !== null) {
        fakeLocalStorage.setItem(GOAL_KEY, data.goal);
      }

      if(window.fbSave) window.fbSave(data.entries, data.goal || null);
      alert("Tiedot tuotu onnistuneesti.");
      render();
      updateChart();

    } catch (err) {
      alert("JSON-luku epäonnistui.");
    }
  };

  reader.readAsText(file);
};

// ============================
// MUOKKAUS & POISTO
// ============================
let editingDate = null;

window.openEditRow = function(date){
  editingDate = date;
  const arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const entry = arr.find(x => x.date === date);
  if(!entry) return;
  document.getElementById('editDate').value = entry.date;
  document.getElementById('editWeight').value = entry.weight;
  document.getElementById('editModal').classList.add('open');
};

window.closeEdit = function(){
  document.getElementById('editModal').classList.remove('open');
  editingDate = null;
};

window.closeEditIfOutside = function(e){
  if(e.target === document.getElementById('editModal')) closeEdit();
};

window.saveEdit = function(){
  const newDate = document.getElementById('editDate').value;
  const newWeight = parseFloat(document.getElementById('editWeight').value);
  if(!newDate || isNaN(newWeight)){ alert('Tarkista päivämäärä ja paino!'); return; }
  let arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  const idx = arr.findIndex(x => x.date === editingDate);
  if(idx >= 0){ arr[idx] = { date: newDate, weight: newWeight }; }
  arr.sort((a,b) => new Date(a.date)-new Date(b.date));
  fakeLocalStorage.setItem(KEY, JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));
  closeEdit();
  render(); updateChart();
};

window.deleteRow = function(date){
  if(!confirm('Poistetaanko tämä kirjaus?')) return;
  let arr = JSON.parse(fakeLocalStorage.getItem(KEY)||"[]");
  arr = arr.filter(x => x.date !== date);
  fakeLocalStorage.setItem(KEY, JSON.stringify(arr));
  if(window.fbSave) window.fbSave(arr, fakeLocalStorage.getItem(GOAL_KEY));
  render(); updateChart();
};

// ============================
// PIN (Firebasesta)
// ============================
const PIN_SESSION = 'paino_pin_ok';
let pinBuffer = '';

function renderPinDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pinBuffer.length));
}

async function checkPin(){
  const err = document.getElementById('pinError');
  try {
    const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const apps = getApps();
    const fbApp2 = apps.length ? apps[0] : initializeApp({
      apiKey:"AIzaSyDswdEF9J0gsHJH6Zo_8BGZrf8DVG3FwYc",
      authDomain:"hakemuspaivakirja.firebaseapp.com",
      projectId:"hakemuspaivakirja"
    });
    const db2 = getFirestore(fbApp2);
    const snap = await getDoc(doc(db2, 'paino', 'pin'));
    if(!snap.exists()){ unlock(); return; }
    if(pinBuffer === snap.data().code){
      sessionStorage.setItem(PIN_SESSION, '1');
      unlock();
    } else {
      err.textContent = 'Väärä PIN-koodi';
      pinBuffer = '';
      setTimeout(() => renderPinDots(), 300);
    }
  } catch(e){
    err.textContent = 'Yhteysvirhe, yritä uudelleen';
    pinBuffer = ''; renderPinDots();
  }
}

function unlock(){
  document.getElementById('pinScreen').style.display = 'none';
}

function handlePinKey(v){
  const err = document.getElementById('pinError');
  if(v==='clear'){ pinBuffer=''; renderPinDots(); err.textContent=''; return; }
  if(v==='back'){ pinBuffer=pinBuffer.slice(0,-1); renderPinDots(); err.textContent=''; return; }
  if(pinBuffer.length >= 4) return;
  pinBuffer += v; renderPinDots();
  if(pinBuffer.length === 4) checkPin();
}

document.querySelectorAll('.pin-key').forEach(btn => {
  btn.addEventListener('click', () => handlePinKey(btn.dataset.v));
});

if(sessionStorage.getItem(PIN_SESSION)){
  unlock();
}
</script>
